<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - SmartFare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <script>
  (function () {
    const savedTheme = localStorage.getItem("smartfare-theme") || "dark";
    document.documentElement.setAttribute("data-theme", savedTheme);
  })();
</script>
</head>
<body class="grid-bg">

  <nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="/">
        <span class="logo-box"><span class="logo-letter">S</span></span>
        <span class="brand-text">Smart<span class="brand-accent">Fare</span></span>
      </a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto me-3" id="navLinks"></ul>
        <div class="d-flex gap-2" id="navButtons"></div>
      </div>
    </div>
  </nav>

  <main style="min-height:100vh; display:flex; align-items:center; padding-top:80px; padding-bottom:40px;">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">

          <div class="fade-in" style="background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:var(--radius-xl); padding:2.25rem; backdrop-filter:blur(24px);">
            <div class="text-center mb-5">
              <div class="logo-box mx-auto mb-3" style="width:46px;height:46px;">
                <span class="logo-letter" style="font-size:20px;">S</span>
              </div>
              <h2 class="fw-bold mb-1" style="font-size:1.5rem;letter-spacing:-0.02em;">Create account</h2>
              <p style="color:var(--text-muted); font-size:0.85rem; margin:0;">Join SmartFare and start saving on rides</p>
            </div>

            <div id="errorMessage" class="alert-custom d-none mb-4"></div>

            <form id="signupForm">
              <div class="mb-3">
                <label for="name" class="form-label-custom">Full Name</label>
                <input type="text" class="form-control form-control-custom" id="name"
                  placeholder="John Doe" required autocomplete="name">
              </div>

              <div class="mb-3">
                <label for="email" class="form-label-custom">Email</label>
                <input type="email" class="form-control form-control-custom" id="email"
                  placeholder="your@email.com" required autocomplete="email">
              </div>

              <div class="mb-3">
                <label for="password" class="form-label-custom">Password</label>
                <div class="input-password-wrap">
                  <input type="password" class="form-control form-control-custom" id="password"
                    placeholder="At least 6 characters" required autocomplete="new-password">
                  <button type="button" class="password-toggle" onclick="togglePassword('password', this)">👁</button>
                </div>
              </div>

              <div class="mb-4">
                <label for="confirmPassword" class="form-label-custom">Confirm Password</label>
                <div class="input-password-wrap">
                  <input type="password" class="form-control form-control-custom" id="confirmPassword"
                    placeholder="Re-enter password" required autocomplete="new-password">
                  <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword', this)">👁</button>
                </div>
              </div>

              <button type="submit" id="submitBtn" class="btn btn-primary-custom w-100">
                Create Account
              </button>
            </form>

            <div class="d-flex align-items-center my-4">
              <div class="flex-grow-1" style="height:1px;background:var(--border);"></div>
              <span class="px-3" style="color:var(--text-muted); font-size:0.78rem;">OR</span>
              <div class="flex-grow-1" style="height:1px;background:var(--border);"></div>
            </div>

            <div class="text-center">
              <p style="color:var(--text-muted); font-size:0.85rem; margin:0;">
                Already have an account?
                <a href="/login" class="text-decoration-none" style="color:var(--primary-light); font-weight:600;">Login</a>
              </p>
            </div>
          </div>

          <div class="text-center mt-4">
            <a href="/" style="color:var(--text-muted); text-decoration:none; font-size:0.82rem;">← Back to Home</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/theme.js"></script>
  <script src="/js/navbar.js"></script>
  <script src="/js/signup.js"></script>
  <script>
    function togglePassword(id, btn) {
      const input = document.getElementById(id);
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      btn.textContent = isHidden ? '🙈' : '👁';
    }
  </script>
</body>
</html>
